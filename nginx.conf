server {
    listen 80;
    server_name doorman.fr www.doorman.fr localhost;
    client_max_body_size 50M;

    # Optional: redirect HTTP to HTTPS for production domains
    # if ($host ~* ^(doorman\.fr|www\.doorman\.fr)$ ) {
    #    return 301 https://$host$request_uri;
    # }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy (optional, but good for relative paths)
    location /api/ {
        proxy_pass http://srv-captain--backend-apartments:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# HTTPS server (Keep for production, but it will fail if certs are missing)
